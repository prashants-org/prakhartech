<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting…</title>
    <script>
      const { pathname, search, hash } = window.location;
      window.location.replace(
        `/?redirect=${encodeURIComponent(pathname + search + hash)}`,
      );
    </script>
  </head>
  <body></body>
</html>
